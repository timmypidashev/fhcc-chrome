<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FHCC — Home</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
  <header>
    <h1>FHCC</h1>
  </header>

  <main class="grid">
    <a class="tile t-search" href="https://kiddle.co">
      <div class="icon">K</div>
      <h2>Kiddle</h2>
    </a>
    <a class="tile t-typing" href="https://typing.com">
      <div class="icon">T</div>
      <h2>Typing.com</h2>
    </a>
    <a class="tile t-wolfram" href="https://wolframalpha.com">
      <div class="icon">W</div>
      <h2>Wolfram Alpha</h2>
    </a>
    <a class="tile t-britannica" href="https://kids.britannica.com">
      <div class="icon">B</div>
      <h2>Britannica Kids</h2>
    </a>
    <a class="tile t-docs" href="https://docs.google.com">
      <div class="icon">D</div>
      <h2>Google Docs</h2>
    </a>
    <a class="tile t-drive" href="https://drive.google.com">
      <div class="icon">G</div>
      <h2>Google Drive</h2>
    </a>
    <a class="tile t-slides" href="https://slides.google.com">
      <div class="icon">S</div>
      <h2>Google Slides</h2>
    </a>
  </main>

  <footer><span id="clock"></span></footer>
  <script src="shared.js"></script>
</body>
</html>
